a(6,12,'race','宜蘭羅東長征 150km / 3000m','出發時間：5:30 AM（竹北出發）\n\n巴陵之前：Z2 配速，功率 100-130W\n宇老爬升：守住 160-170W，不要跟人拚\n明池之後：看體力決定，不要硬撐\n補給：每 45-60min 補一次，不等餓\n\n支援車從巴陵加入，好好享受這一天。','全程配速 100-170W');

a(6,23,'thresh','門檻課 建設1｜75min','熱身 15min\n3x10min @ 158-167W（SST，休 5min）\n緩和 10min\n\n04:30 補給提醒：出門前吃香蕉','158-167W SST');

a(6,27,'long','長爬坡 建設1｜3h','Z2 底（100-135W）\n中間 2 段 x 20min 爬坡 @ 150-175W Tempo\n\n找大山背或附近有坡度的路段。','100-135W Z2 | 爬坡 150-175W');

a(6,29,'rest','休息','恢復日。','—');
a(6,30,'thresh','門檻課 建設2｜75min','熱身 15min\n2x15min @ 171-180W（門檻，休 8min）\n緩和 10min\n\n04:30 補給提醒：出門前吃香蕉','171-180W 門檻');

a(7,2,'vo2','VO2 課 建設2｜75min','熱身 15min\nOver-Under 4x6min（2min@170W / 1min@195W，休 4min）\n緩和 10min\n\n04:30 補給提醒：出門前吃香蕉','Over-Under 170W/195W');
a(7,3,'rest','休息 或 輕轉','看疲勞決定。','—');
a(7,4,'long','長爬坡 建設2｜3h','Z2 底（100-135W）\n中間 2-3 段 x 25min 爬坡 @ 155-175W\n\n這週爬坡時間拉長，模擬武嶺持續爬升的感覺。','100-135W Z2 | 爬坡 155-175W');
a(7,5,'run','慢跑 Z2｜50min','輕鬆有氧。','心率 Z2');
a(7,6,'rest','休息','恢復日。','—');
a(7,7,'thresh','門檻課 建設3｜75min','熱身 15min\n3x12min @ 171-180W（休 6min）\n緩和 10min\n\n04:30 補給提醒：出門前吃香蕉\n這是整個計畫強度最高的門檻課。','171-180W 門檻');
a(7,8,'run','慢跑 Z2｜50min','輕鬆有氧跑。','心率 Z2');
a(7,9,'vo2','VO2 課 建設3｜75min','熱身 15min\n4x4min @ 205W（休 4min）\n緩和 10min\n\n04:30 補給提醒：出門前吃香蕉\n本計畫最高強度 VO2 課。','205W VO2');
a(7,10,'rest','休息 或 輕轉','看疲勞，建設3最累的一週，不要硬撐。','—');
a(7,11,'long','長爬坡 建設3｜3h（最長課）','Z2 底（100-135W）\n中間 3 段 x 30min 爬坡 @ 155-175W\n\n找最能模擬武嶺的路線，練補給、配速、齒比。\n這是 7/31 前最關鍵的一課。','100-135W Z2 | 爬坡 155-175W');
a(7,12,'easy','輕鬆騎｜60min','Z2 輕鬆，不需要強度。','100-120W');
a(7,13,'rest','休息（吸收週開始）','建設3結束，讓身體吸收訓練刺激。\n這週量砍一半，頻率不變。','—');
a(7,14,'easy','輕鬆騎｜60min','Z2 輕鬆，感受腿感恢復。','100-120W');
a(7,15,'run','慢跑 Z2｜40min','輕鬆有氧跑。','心率 Z2');
a(7,16,'easy','輕鬆騎｜60min','Z2 輕鬆，開始感覺腿有力了就是在吸收。','100-120W');
a(7,17,'rest','休息','明天武嶺模擬，今天保留能量。','—');
a(7,18,'sim','武嶺模擬爬坡｜3h（關鍵課）','從竹北出發往山區，找最長最硬的爬坡段。\n\n爬升目標：1500-2000m\n配速：全程守住 155-170W，練習不爆\n補給：每 45min 一次，模擬武嶺補給節奏\n齒比：確認 33x33 夠不夠用\n\n這是 7/31 前的最後一次高強度長課，完成後最難的部分就結束了。','155-170W 持續爬坡');
a(7,19,'easy','輕鬆騎｜60min','非常輕鬆，恢復昨天的模擬課疲勞。','100-120W');
a(7,20,'rest','休息','恢復日。','—');
a(7,21,'thresh','短門檻｜60min','熱身 15min\n2x10min @ 171-180W（休 6min）\n緩和 10min\n\n量比建設期小，維持感覺為主。','171-180W');
a(7,22,'run','慢跑 Z2｜40min','輕鬆有氧跑。\n7/26 起停跑直到武嶺後。','心率 Z2');
a(7,23,'easy','輕鬆騎｜60min','Z2 輕鬆，感受狀況。','100-120W');
a(7,24,'rest','休息','恢復日。','—');
a(7,25,'easy','輕鬆騎｜2h','Z2 輕鬆長騎，最後一次累積騎乘感。\n不需要爬坡或強度。','100-130W');
a(7,26,'rest','休息（減量週開始）','從今天起進入最終減量。\n停跑，停一切強度。','—');
a(7,27,'thresh','短刺激｜45min','熱身 15min\n3x5min @ 171-180W（休 4min）\n緩和 10min\n\n只是讓身體記得高強度的感覺，不是真的在練。','171-180W 短刺激');
a(7,28,'easy','輕鬆騎｜45min','Z2 輕鬆，感受腿感清晰飽滿。','100-120W');
a(7,29,'easy','開腿｜30min','輕鬆騎 + 3 個 10 秒加速衝刺\n讓身體感覺活躍準備好了。','輕鬆 + 短加速');
a(7,30,'rest','休息＋補碳水','完全休息，多吃主食補充肝醣。\n準備明天武嶺！','—');

var months = [
  {year:2026,month:6,name:'6月',sub:'6/1-6/7 最後刺激 → 6/8-6/11 減量 → 6/12 宜蘭 → 6/13-6/21 恢復 → 6/22起建設1',note:'6/12 前最後強度課是 6/2（門檻）和 6/4（VO2）。6/8 起停跑。6/12 宜蘭羅東長征出發！賽後讓腿真的好好休息再進入建設期。'},
  {year:2026,month:7,name:'7月',sub:'建設2→建設3→吸收週→7/18武嶺模擬→減量→7/31武嶺',note:'7/18 是最後一次高強度模擬課（武嶺模擬爬坡），之後進入減量。7/26 起停跑、停強度，讓身體充分恢復迎接 7/31。'},
];
var DOW_LABELS = ['一','二','三','四','五','六','日'];
function buildMonth(cfg){
  var year=cfg.year, month=cfg.month, name=cfg.name, sub=cfg.sub, note=cfg.note;
  var firstDate = new Date(year,month-1,1);
  var firstDow = firstDate.getDay();
  var firstCol = (firstDow + 6) % 7;
  var daysInMonth = new Date(year,month,0).getDate();
  var html = '<div class="month-block">';
  html += '<div class="month-header">';
  html += '<div class="month-title">'+name+'</div>';
  html += '<div class="month-sub">'+sub+'</div>';
  html += '</div>';
  html += '<div class="month-note">'+note+'</div>';
  html += '<div class="cal-grid">';
  html += '<div class="dow-header">';
  for(var i=0;i<7;i++) html += '<span>'+DOW_LABELS[i]+'</span>';
  html += '</div>';
  var day=1, col=firstCol, weekOpen=false;
  while(day<=daysInMonth){
    if(!weekOpen){
      html+='<div class="cal-week">';
      weekOpen=true;
      if(day===1&&col>0){
        for(var j=0;j<col;j++) html+='<div class="cal-day empty"></div>';
      }
    }
    var key=month+'-'+day;
    var ev=S[key];
    if(ev){
      var t=T[ev.type]||T.rest;
      var dist='';
      var m2=ev.title.match(/[0-9]+\.?[0-9]*(?:km|h|min)/);
      if(m2) dist=m2[0];
      html+='<div class="cal-day" style="background:'+t.bg+'" onclick="showModal('+month+','+day+')">';
      html+='<div class="day-num" style="color:'+t.color+'">'+day+'</div>';
      html+='<span class="day-badge" style="background:'+t.bg+';color:'+t.color+'">'+t.label+'</span>';
      if(dist) html+='<div class="day-dist" style="color:'+t.color+'">'+dist+'</div>';
      html+='</div>';
    } else {
      html+='<div class="cal-day empty"><div class="day-num">'+day+'</div></div>';
    }
    col++;
    if(col===7){html+='</div>';weekOpen=false;col=0;}
    day++;
  }
  if(weekOpen){
    for(var k=col;k<7;k++) html+='<div class="cal-day empty"></div>';
    html+='</div>';
  }
  html+='</div></div>';
  return html;
}
document.getElementById('calendars').innerHTML=months.map(buildMonth).join('');
function showModal(m,d){
  var ev=S[m+'-'+d];
  if(!ev) return;
  var t=T[ev.type]||T.rest;
  var dow=['日','一','二','三','四','五','六'];
  var dateObj=new Date(2026,m-1,d);
  document.getElementById('modalDate').textContent='2026/'+m+'/'+d+'（週'+dow[dateObj.getDay()]+'）';
  document.getElementById('modalTitle').textContent=ev.title;
  var badge=document.getElementById('modalBadge');
  badge.textContent=t.label;badge.style.background=t.bg;badge.style.color=t.color;
  document.getElementById('modalDetail').innerHTML=ev.detail.split('\n').join('<br>');
  document.getElementById('modalHR').textContent='功率/強度：'+ev.hr;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e){
  if(!e||e.target===document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}
</script>
</body>
