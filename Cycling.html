function a(m,d,type,title,detail,hr){ S[m+'-'+d]={type:type,title:title,detail:detail,hr:hr}; }

// ── 六月 ──
a(6,1,'rest','休息','計畫 6/7 啟動，先把身體養好。','—');
a(6,2,'rest','休息','計畫 6/7 啟動。','—');
a(6,3,'rest','休息','計畫 6/7 啟動。','—');
a(6,4,'rest','休息','計畫 6/7 啟動。','—');
a(6,5,'rest','休息','計畫 6/7 啟動。','—');
a(6,6,'rest','休息','計畫 6/7 啟動。','—');
a(6,7,'done','有氧騎乘 45km｜已完成','今日完成 45km 有氧騎乘。課表正式啟動！\n\n6/12 宜蘭羅東長征因天氣取消，改為全力備戰 7/31 武嶺。','—');
a(6,8,'rest','休息','週日長騎後全休恢復。','—');
a(6,9,'easy','輕鬆騎 Z2｜60min','Z2 輕鬆，讓身體從週日長騎恢復。\n不需要任何強度，感覺輕快就對了。','100-130W');
a(6,10,'run','慢跑 Z2｜40-45min','輕鬆能對話的配速，心率控制在 Z2。\n不要跑快，這是有氧基礎日，維持全馬基礎用的。','心率 Z2');
a(6,11,'thresh','入門門檻｜75min','熱身 15min\n2×5分 @ 166W（休 5min）\n緩和 10min\n\n本週開始輕量強度，讓身體記得爬坡的感覺。\n04:30 補給提醒：出門前吃香蕉！','166W 入門');
a(6,12,'rest','休息（宜蘭已取消）','宜蘭羅東長征因天氣取消，今日全休。\n把這天的能量留給武嶺。','—');
a(6,13,'run','慢跑 Z2｜45-50min','輕鬆有氧，能對話。','心率 Z2');
a(6,14,'long','長騎 週日｜3h','Z2 底（113-132W）\n中間找一段 15-20min 短爬坡 @ ~150W 輕鬆 tempo\n\n第一次週日長騎，找感覺為主，不要太拚。','113-132W Z2 | 爬坡 ~150W');
a(6,15,'rest','休息','恢復日。','—');
a(6,16,'thresh','門檻課 建設一｜75min','熱身 15min\n3×10分 @ 168-178W（SST，段內漸強，休 5min）\n緩和 10min\n\n04:30 補給提醒：出門前吃香蕉！','168-178W SST');
a(6,17,'run','慢跑 Z2｜45-50min','輕鬆有氧跑，能對話。','心率 Z2');
a(6,18,'vo2','VO2 課 建設一｜75min','熱身 15min\n5×3分 @ 204-212W（VO2，休 3min）\n緩和 10min\n\n04:30 補給提醒：出門前吃香蕉！','204-212W VO2');
a(6,19,'rest','休息（端午節）','端午節假期，完全休息。','—');
a(6,20,'run','慢跑 Z2｜50min','輕鬆有氧，能對話。','心率 Z2');
a(6,21,'long','長騎 建設一｜3h','Z2 底（113-132W）\n中間 1 段 20-30min 爬坡 @ 142-166W Tempo\n\n建設一週日主課，開始在長騎裡加入爬坡段。','113-132W Z2 | 爬坡 142-166W');
a(6,22,'swim','✅ 游泳 回復水感｜兼休息','• 已能較順地游50-100m\n• 6×50m + 2-3×100m，趟間短休\n• 重點仍是省力、不喘到亂節奏\n約700m，輕鬆當休息。','技術 / 恢復');
a(6,23,'thresh','門檻課 建設二｜75min','熱身 15min\n2×15分 @ 175→183W（門檻 段內負分割，休 8min）\n緩和 10min\n\n04:30 補給提醒：出門前吃香蕉！\n比上週更長的間歇，讓身體適應武嶺持續輸出。','175-183W 門檻');
a(6,24,'run','慢跑 Z2｜50min','輕鬆有氧跑。','心率 Z2');
a(6,25,'vo2','Over-Under 建設二｜75min','熱身 15min\nOver-Under 4×6分（2min@176W / 1min@198W，休 4min）\n緩和 10min\n\n04:30 補給提醒：出門前吃香蕉！','Over-Under 176/198W');
a(6,26,'swim','游泳 恢復水感｜兼休息日','停游5年+回鍋，重點是找回水感、不是游量。\n• 用 interval 不要硬撐連續：8-10×50m，每趟休20-30秒\n• 水裡用鼻子持續吐氣、抬頭只負責吸（解決一半的喘）\n• 先求身體打平不下沉，再求速度\n總量約500m，輕鬆為主，當休息日。','技術 / 恢復');
a(6,27,'run','慢跑 Z2｜55min','輕鬆有氧跑，這週稍長一點。','心率 Z2');
a(6,28,'long','長騎 建設二｜3h','Z2 底（113-132W）\n中間 1 段 30-40min 門檻爬坡 @ 178-185W\n\n這週爬坡段拉到門檻強度，練武嶺的持續配速感覺。','113-132W Z2 | 爬坡 178-185W');
a(6,29,'swim','游泳 恢復水感｜兼休息日','• 8-10×50m，趟間休20-30秒，動作品質優先\n• 持續吐氣、放慢換氣節奏\n• 穿插1-2趟打水板或側漂，找「髖部浮起來」的感覺\n總量500-600m，輕鬆當休息。','技術 / 恢復');
a(6,30,'thresh','門檻課 建設三｜75min','熱身 15min\n3×12分 @ 178→185W（段內負分割，休 5min）\n緩和 10min\n\n04:30 補給提醒：出門前吃香蕉！\n這是本計畫強度最高的門檻課。','178-185W 門檻');

// ── 七月 ──
a(7,1,'run','慢跑 Z2｜50min','輕鬆有氧跑。','心率 Z2');
a(7,2,'thresh','武嶺專項 續航｜75min','熱身 15min\n2×20分 @ 175→185W（連續次閾值 段內負分割，休 5min）\n緩和 10min\n\n04:30 補給提醒：出門前吃香蕉！\n原VO2改為武嶺專項：武嶺是4.5h連續爬坡純續航，VO2不對症。練「長時間掛住、後段不掉」——前段175保留、後段才推到185。建設期最關鍵的一堂。','175-185W 續航');
a(7,3,'swim','游泳 恢復水感｜兼休息日','水感回穩後可以開始拉長單趟：\n• 6-8×75m，或 50m混100m，趟間短休\n• 維持吐氣節奏、身體打平\n總量600-700m，輕鬆，當建設三前的休息日。','技術 / 恢復');
a(7,4,'easy','輕鬆騎｜60min','Z2 輕鬆，明天最長長騎前的緩衝日。\n保持腿感，不需要強度。','100-120W');
a(7,5,'sim','武嶺彩排＋宇老PB 週日｜宇老(竹60) 約75-90min全力（建設三峰值 / 賽前26天）','離7/15測試10天、離武嶺26天，恢復夠，放心全力衝PB。開車到尖石/合興，從竹60起點直接開爬。\n\n⚠ 核心：你是快肌/衝刺型，宇老最典型的死法是「前段緩坡太爽超速、後段7.4%崩掉」。整趟策略只有一句——前段壓著、後段才放。\n\n【分段配速｜以FTP189W為錨，主要看RPE、瓦數當護欄】\n■ 段1 尖石大橋→那羅（6.5km 均坡4.3% 約前20min）：陷阱段！168-178W、RPE7，硬性上限181W不准超，迴轉80+。這裡省的力就是後段PB本錢。\n■ 段2 那羅→中段（7.4%持續坡）：進引擎室 181-191W、RPE8，迴轉75+。宇老主體，這段不掉速PB就成立一半。\n■ 段3 最後約9km髮夾彎：開始花存款，持續189W+，遇10-19%陡段surge到204-223W，過彎平緩處回一口。RPE9→10。\n■ 段4 命運交叉口「左轉上」(~1.5km @ ~10%，較緩較長、路寬好會車)：不是200m衝刺，是~6-8分持續收尾！路口別站起來爆，維持189-204W、迴轉70+穩住，最後300-400m才倒乾油箱。\n（左轉比右轉16%緩、適合你快肌型用瓦數穩收，代價是長約1km、慢約5分；頂點會略高於觀景台再小降到終點，別被小起伏弄亂節奏。PB只跟同路線/同Strava段落比。）\n整趟平均約184-189W、壓在75-85min就是硬PB（7/15 正式 FTP 測試會驗證這個數字）。\n\n【一兼二顧的驗證】\n■ 齒比：陡段被迫掉到60轉以下硬輾＝PB限速器，也是10-36+30T該上武嶺的鐵證。\n■ 補給：每45min一次，PB高強度下還吞得下電解質/能量正是武嶺要驗的，別因衝PB就不補。\n■ 早出發：下段曝曬熱又有砂石車，清晨涼、車少、安全。','PB配速 段1≤181W→左轉穩收');
a(7,6,'swim','游泳 超輕恢復｜彩排後','宇老PB隔天——游泳正好是無衝擊的主動恢復，把腿的疲勞洗掉。\n• 純輕鬆 6-8×50m 技術游，趟間充分休\n• 重點是放鬆、活動，不是練量\n若PB真的榨乾、腿很累，改完全休息也OK。','超輕 / 主動恢復');
a(7,7,'easy','輕鬆騎 Z2｜50-60min','彩排後第2天，輕鬆轉動把腿的疲勞洗掉。\n保持腿感，不需要強度。','100-120W');
a(7,8,'done','✅ SST 加碼 4×8分@183W｜已完成','實際執行：4×8分 @ 183W（組間休 3min），ERG 踏頻 95。\n整堂 IF 0.88、TSS 67.8；心率均 143 / 最高 157，四組零漂移。\n\n94.8%FTP（舊基準193W）強度下心率如此經濟＝閾值上修前兆——隔天測試證實。','183W×4×8min｜HR 143/157');
a(7,9,'ftp','✅ FTP測試 CP20｜227W → FTP 216W','颱風來臨前搶測（原定7/15提前）。45min 熱身後開測：\n▶ 20min 均功率 227W（負分割：前半225 / 後半229，VI 1.02 教科書級穩定）\n▶ 10min PR 229W｜15min PR 228W\n心率均 155 / 最高 173、踏頻 83。\n\n★ FTP = 227×0.95 = 216W（3.54 W/kg）\n武嶺 sub-5 門檻 3.0 遠遠超過。膝蓋零狀況。7/15 原測試日取消。','CP20 227W｜FTP 216W ✅');
a(7,10,'swim','游泳 恢復水感｜兼休息日','• 6-8×75-100m，趟間短休，維持動作不散\n• 持續吐氣、身體打平\n總量700-800m，輕鬆當休息日，幫週四課後恢復。','技術 / 恢復');
a(7,11,'done','✅ 巴威颱風→室內台 111min｜已完成','原定戶外爬坡耐力課，颱風改室內（Merida＋T500 ERG）。\n111min、NP 163W、IF 0.75、TSS 105。\n爬坡 Block1：29.6min@175W（脫鉤2.0%）｜Block2：28.5min@179W（脫鉤4.3%），HR峰值153未進Z4。\n\n✔ 交叉驗證 216W 新FTP 與武嶺 175-180W 配速目標。\n⚠ 坐墊壓迫中段出現、Z2段自行緩解→賽前對齊 Reacto/Propel 座高＋主動站立間隔。','NP163W IF0.75 TSS105');
a(7,12,'done','✅ Brick 騎＋轉換跑｜已完成','騎 70min／37.2km｜均167W（IF0.77）踏頻95 均HR145\n＋轉換跑 5.47km @ 4:46/km｜HR 142/150\n\n轉換零失速（跑步HR比騎車還低）、膝蓋完全無恙。\n發現：①上坡心肺是跑步限制因子 ②腕式光學低估HR→之後強度跑改胸帶。\n⚠ 武嶺前跑步到此為止，不再跑。','騎167W＋跑4:46/km');
a(7,13,'swim','游泳 輕技術｜兼休息日','測試前2天，游泳低衝擊不影響腿，正好當休息。\n• 純技術純輕鬆：6×50m + 2×100m，充分休\n• 不要累，重點是放鬆＋保持水感\n游完讓腿清爽，準備7/15測試。','輕技術 / 恢復');
a(7,14,'easy','輕鬆騎 Z2｜60min','FTP 已於 7/9 測畢（216W），原「測前開腿」取消。\nZ2 輕鬆轉，把身體養順準備出國。','135-160W Z2');
a(7,15,'thresh','SST 出國前引擎touch｜75min','熱身 15min\n3×10分 @ 190-200W（SST，休 5min）\n緩和 10min\n\n出國前最後一次質量touch——7/11到7/23之間原本有12天強度空窗，這課補上。不到力竭，越南6天剛好把它完全吸收。\n⚠ 腿還沉（上週連五天大負荷）就降成 2×10分 或踩 SST 下緣 190W。','190-200W SST');
a(7,16,'easy','輕鬆騎｜45min（出國前一天）','輕鬆騎 Z2，明天出國，保持身體活躍就好。\n越南 6 天有泳池：帶泳鏡，每天 20-30min 技術游是加分不是負擔。','130-150W');
a(7,17,'abroad','✈ 出國 Day 1','出國旅行，完全休息。\n這6天完全不騎，剛好是武嶺前9天的大休息——FTP不會掉（要10-14天不練才流失），只是腿感會鈍，回國後再喚醒即可。\n飲食盡量正常，多走路活動。','—');
a(7,18,'abroad','✈ 出國 Day 2','出國中，休息。','—');
a(7,19,'abroad','✈ 出國 Day 3','出國中，休息。','—');
a(7,20,'abroad','✈ 出國 Day 4','出國中，休息。','—');
a(7,21,'abroad','✈ 出國 Day 5','出國中，休息。','—');
a(7,22,'abroad','✈ 返國（Day 6）','今天返國。\n旅途疲勞就完全休息，狀態還好可以輕轉 30min。\n不需要勉強，明天才正式啟動。','—');
a(7,23,'thresh','短刺激｜50min（返國啟動課）','熱身 15min\n3×3分 @ 門檻附近 (210-225W)（休 3min）\n緩和 10min\n\n6 天沒騎，這課是重新啟動神經肌肉用的短刺激，不是建設課。\n做完感覺腿有回來就對了。第一組先保守，腿感鈍就降到 205W。','210-225W 短刺激');
a(7,24,'swim','游泳 恢復水感｜兼休息日','返國銳化週，游泳當低衝擊恢復。\n• 8×50m + 2-3×100m，趟間短休，輕鬆\n• 維持吐氣與身體打平\n總量約700m，幫7/23啟動課後恢復，不要累到。','技術 / 恢復');
a(7,25,'thresh','武嶺配速課｜90min','Z2 底＋2×15分 @ 175-185W（賽事主段配速，休 8min）\n\n距武嶺 6 天的黃金收操位置：賽事專項強度、量小不積疲勞，讓身體最後一次「預習」比賽瓦數的感覺。\n做完腿應該是興奮、不是累。','Z2＋175-185W 賽配速');
a(7,26,'easy','短騎＋開腿｜40min','輕鬆騎 30min＋3 個 10 秒加速衝刺。\n讓身體感覺活躍，保持神經肌肉敏銳。','輕鬆 + 短加速');
a(7,27,'swim','游泳 輕鬆鬆動｜兼休息日','武嶺週！游泳只為鬆動放鬆，不練任何東西。\n• 6-8×50m 超輕技術游，充分休\n• 純粹活動筋骨、保持水感\n游完腿要更輕鬆，不是更累。','超輕 / 鬆動');
a(7,28,'easy','輕轉＋開腿｜40min','輕鬆騎 30min＋3 個 30 秒加速。\n腿感覺清晰有力就對了。','輕鬆 + 短加速');
a(7,29,'rest','休息（存能量）','完全休息，開始補充肝醣。\n多吃主食：米飯、麵包、香蕉、地瓜。','—');
a(7,30,'easy','開腿｜30min＋3×10秒衝刺','輕鬆騎 25min＋3 個 10 秒全力衝刺（中間完整休息）。\n今晚早睡、吃夠碳水，準備明天武嶺！','輕鬆 + 短衝刺');
a(7,31,'race','武嶺挑戰日 3275m｜sub-5','目標：sub-5（FTP 216W / 3.54 W/kg，遠超 3.0 門檻）｜齒比 33/33 定案不換\n\n七段配速（216W 基準｜段均AP，短陡坡 surge-and-recover）：\n①地理中心碑→人止關（16k/2.1%）：145-160W，Z2 熱身鐵律不超速\n②人止關→霧社（6k/6.4%）：165-180W，建立節奏\n③霧社→清境（10.5k/5.8%）：170-183W｜清境富嘉7-11黃金補給9min：交回一瓶改單瓶、吃御飯糰\n④清境→翠峰（9.5k/7.2%）：175-185W，全程最重要一段\n⑤翠峰→鳶峰（4.5k/8%）：160-175W｜過翠峰改 HR上限＋體感，功率自然掉是正常\n⑥鳶峰→昆陽（5k/7.4%）：150-165W 體感優先｜昆陽魔王500m＝唯一真持續關卡（~4-5min 近FTP 190-210W），壓過或下車推的決策點\n⑦昆陽→武嶺天堂路（2k/8.3%）：135-155W，一腳一腳踩完\n\n短陡坡：<60-90秒 surge（瞬時最高~230-250W）過坡即回收，守段均不守瞬時。\n水：雙瓶680×2 撐到清境→之後單瓶輕量化；起點→霧社77min是唯一無支援窗口，出發前先灌300-400ml。\n補給：膠8-9條（每40-45min）＋FIN；固體限清境以下；支援點霧社/清境/翠峰/鳶峰/昆陽，挑1-2點備白開水配膠。\n幹大事！','段均145-185W｜>翠峰改體感＋HR上限');

var DOW_LABELS = ['一','二','三','四','五','六','日'];
function buildMonth(cfg){
  var year=cfg.year, month=cfg.month, name=cfg.name, sub=cfg.sub, note=cfg.note;
  var firstDate = new Date(year,month-1,1);
  var firstDow = firstDate.getDay();
  var firstCol = (firstDow + 6) % 7;
  var daysInMonth = new Date(year,month,0).getDate();
  var html = '<div class="month-block">';
  html += '<div class="month-header">';
  html += '<div class="month-title">'+name+'</div>';
  html += '<div class="month-sub">'+sub+'</div>';
  html += '</div>';
  html += '<div class="month-note">'+note+'</div>';
  html += '<div class="cal-grid">';
  html += '<div class="dow-header">';
  for(var i=0;i<7;i++) html += '<span>'+DOW_LABELS[i]+'</span>';
  html += '</div>';
  var day=1, col=firstCol, weekOpen=false;
  while(day<=daysInMonth){
    if(!weekOpen){
      html+='<div class="cal-week">';
      weekOpen=true;
      if(day===1&&col>0){
        for(var j=0;j<col;j++) html+='<div class="cal-day empty"></div>';
      }
    }
    var key=month+'-'+day;
    var ev=S[key];
    if(ev){
      var t=T[ev.type]||T.rest;
      var dist='';
      var m2=ev.title.match(/[0-9]+\.?[0-9]*(?:km|h|min)/);
      if(m2) dist=m2[0];
      html+='<div class="cal-day" style="background:'+t.bg+'" onclick="showModal('+month+','+day+')">';
      html+='<div class="day-num" style="color:'+t.color+'">'+day+'</div>';
      html+='<span class="day-badge" style="background:'+t.bg+';color:'+t.color+'">'+t.label+'</span>';
      if(dist) html+='<div class="day-dist" style="color:'+t.color+'">'+dist+'</div>';
      html+='</div>';
    } else {
      html+='<div class="cal-day empty"><div class="day-num">'+day+'</div></div>';
    }
    col++;
    if(col===7){html+='</div>';weekOpen=false;col=0;}
    day++;
  }
  if(weekOpen){
    for(var k=col;k<7;k++) html+='<div class="cal-day empty"></div>';
    html+='</div>';
  }
  html+='</div></div>';
  return html;
}
document.getElementById('calendars').innerHTML=months.map(buildMonth).join('');
function showModal(m,d){
  var ev=S[m+'-'+d];
  if(!ev) return;
  var t=T[ev.type]||T.rest;
  var dow=['日','一','二','三','四','五','六'];
  var dateObj=new Date(2026,m-1,d);
  document.getElementById('modalDate').textContent='2026/'+m+'/'+d+'（週'+dow[dateObj.getDay()]+'）';
  document.getElementById('modalTitle').textContent=ev.title;
  var badge=document.getElementById('modalBadge');
  badge.textContent=t.label;badge.style.background=t.bg;badge.style.color=t.color;
  document.getElementById('modalDetail').innerHTML=ev.detail.split('\n').join('<br>');
  document.getElementById('modalHR').textContent='功率/強度：'+ev.hr;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e){
  if(!e||e.target===document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}
</script>
