const DOW_LABELS = ['一','二','三','四','五','六','日'];

function buildMonth(cfg){
  const {year,month,name,sub,note} = cfg;
  // JS Date: getDay() 0=Sun,1=Mon...6=Sat; getDay() Mon=1
  const firstDate = new Date(year,month-1,1);
  const firstDow = firstDate.getDay(); // 0=Sun
  // Convert to Mon-first index: Mon=0...Sun=6
  const firstCol = (firstDow + 6) % 7;
  const daysInMonth = new Date(year,month,0).getDate();

  let html = `<div class="month-block">
    <div class="month-header">
      <div class="month-title">${name}</div>
      <div class="month-sub">${sub}</div>
    </div>
    <div class="month-note">${note}</div>
    <div class="cal-grid">
      <div class="dow-header">${DOW_LABELS.map(d=>`<span>${d}</span>`).join('')}</div>`;

  let day = 1;
  let col = firstCol;
  let weekOpen = false;

  while(day <= daysInMonth){
    if(!weekOpen){
      html += '<div class="cal-week">';
      weekOpen = true;
      // fill empty cells at start
      if(day===1 && col>0){
        for(let i=0;i<col;i++) html += '<div class="cal-day empty"></div>';
      }
    }

    const key = `${month}-${day}`;
    const ev = S[key];
    if(ev){
      const t = T[ev.type]||T.rest;
      const dist = ev.title.match(/\d+\.?\d*k/)?.[0]||'';
      html += `<div class="cal-day" style="background:${t.bg}" onclick="showModal(${month},${day})">
        <div class="day-num" style="color:${t.color}">${day}</div>
        <span class="day-badge" style="background:${t.bg};color:${t.color}">${t.label}</span>
        ${dist?`<div class="day-dist" style="color:${t.color}">${dist}</div>`:''}
      </div>`;
    } else {
      html += `<div class="cal-day empty"><div class="day-num">${day}</div></div>`;
    }

    col++;
    if(col===7){
      html += '</div>';
      weekOpen = false;
      col = 0;
    }
    day++;
  }

  // close last week
  if(weekOpen){
    for(let i=col;i<7;i++) html += '<div class="cal-day empty"></div>';
    html += '</div>';
  }

  html += '</div></div>';
  return html;
}

document.getElementById('calendars').innerHTML = months.map(buildMonth).join('');

function showModal(m,d){
  const ev = S[`${m}-${d}`];
  if(!ev) return;
  const t = T[ev.type]||T.rest;
  const dow = ['日','一','二','三','四','五','六'];
  const dateObj = new Date(2026,m-1,d);
  document.getElementById('modalDate').textContent = `2026/${m}/${d}（週${dow[dateObj.getDay()]}）`;
  document.getElementById('modalTitle').textContent = ev.title;
  const badge = document.getElementById('modalBadge');
  badge.textContent = t.label;
  badge.style.background = t.bg;
  badge.style.color = t.color;
  document.getElementById('modalDetail').innerHTML = ev.detail.replace(/\n/g,'<br>');
  document.getElementById('modalHR').textContent = `心率區間：${ev.hr}`;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e){
  if(!e || e.target===document.getElementById('modalOverlay')){
    document.getElementById('modalOverlay').classList.remove('open');
  }
}
