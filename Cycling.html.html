a(7,5,'sim','武嶺彩排 週日｜3h（建設三峰值 / 賽前26天）','找最長最硬的爬坡段，用武嶺配速演練 2.5-3h。\n\n爬升目標：1000-1500m\n配速：守住 130-145W（是演練不是比賽）\n補給：每 45min 一次，模擬武嶺補給節奏\n齒比：確認齒比夠不夠用\n\n這是整個建設期的最高點。做完這課，最難的部分就結束了。\n之後進入吸收週，讓身體超補償。','130-145W 武嶺配速');

a(7,8,'ftp','FTP 測試｜75min（正式）','熱身 15min（漸進式，最後幾分鐘接近 170W）\n5min @ ~190W 暖爐衝\n5min 完全恢復（停下來也可以）\n▶ 20分鐘全力！（找穩定爬坡段或室內台）\n緩和 10min\n\nFTP = 20分均功率 × 0.95\n\n這個數字決定後續 3 週的武嶺配速目標，認真騎！','目標突破 180W');

  var html = '<div class="month-block">';
  html += '<div class="month-header">';
  html += '<div class="month-title">'+name+'</div>';
  html += '<div class="month-sub">'+sub+'</div>';
  html += '</div>';
  html += '<div class="month-note">'+note+'</div>';
  html += '<div class="cal-grid">';
  html += '<div class="dow-header">';
  for(var i=0;i<7;i++) html += '<span>'+DOW_LABELS[i]+'</span>';
  html += '</div>';
  var day=1, col=firstCol, weekOpen=false;
  while(day<=daysInMonth){
    if(!weekOpen){
      html+='<div class="cal-week">';
      weekOpen=true;
      if(day===1&&col>0){
        for(var j=0;j<col;j++) html+='<div class="cal-day empty"></div>';
      }
    }
    var key=month+'-'+day;
    var ev=S[key];
    if(ev){
      var t=T[ev.type]||T.rest;
      var dist='';
      var m2=ev.title.match(/[0-9]+\.?[0-9]*(?:km|h|min)/);
      if(m2) dist=m2[0];
      html+='<div class="cal-day" style="background:'+t.bg+'" onclick="showModal('+month+','+day+')">';
      html+='<div class="day-num" style="color:'+t.color+'">'+day+'</div>';
      html+='<span class="day-badge" style="background:'+t.bg+';color:'+t.color+'">'+t.label+'</span>';
      if(dist) html+='<div class="day-dist" style="color:'+t.color+'">'+dist+'</div>';
      html+='</div>';
    } else {
      html+='<div class="cal-day empty"><div class="day-num">'+day+'</div></div>';
    }
    col++;
    if(col===7){html+='</div>';weekOpen=false;col=0;}
    day++;
  }
  if(weekOpen){
    for(var k=col;k<7;k++) html+='<div class="cal-day empty"></div>';
    html+='</div>';
  }
  html+='</div></div>';
  return html;
}
document.getElementById('calendars').innerHTML=months.map(buildMonth).join('');
function showModal(m,d){
  var ev=S[m+'-'+d];
  if(!ev) return;
  var t=T[ev.type]||T.rest;
  var dow=['日','一','二','三','四','五','六'];
  var dateObj=new Date(2026,m-1,d);
  document.getElementById('modalDate').textContent='2026/'+m+'/'+d+'（週'+dow[dateObj.getDay()]+'）';
  document.getElementById('modalTitle').textContent=ev.title;
  var badge=document.getElementById('modalBadge');
  badge.textContent=t.label;badge.style.background=t.bg;badge.style.color=t.color;
  document.getElementById('modalDetail').innerHTML=ev.detail.split('\n').join('<br>');
  document.getElementById('modalHR').textContent='功率/強度：'+ev.hr;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e){
  if(!e||e.target===document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}
</script>
